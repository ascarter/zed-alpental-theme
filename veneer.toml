# Alpental palette
[meta]
name = "Alpental"
version = "1.0"

[colors.light]
primary   = "#FFFFFF"
alternate = "#FAFAFA"
secondary = "#F2F2F2"
tertiary  = "#ECECEC"
neutral   = "#CBCBCB"

text_primary          = "#000000"
text_secondary        = "#494949"
text_tertiary         = "#636363"
text_invert_primary   = "#FFFFFF"
text_invert_secondary = "#F2F2F2"
text_disabled         = "#8E8E8E"

[colors.dark]
primary   = "#000000"
alternate = "#151515"
secondary = "#212121"
tertiary  = "#494949"
neutral   = "#CBCBCB"

text_primary          = "#FFFFFF"
text_secondary        = "#CBCBCB"
text_tertiary         = "#7A7A7A"
text_invert_primary   = "#000000"
text_invert_secondary = "#151515"
text_disabled         = "#8E8E8E"

[accents]
info              = "#4294FF"
info_secondary    = "#005E7D"
success           = "#52C133"
success_secondary = "#4A8231"
warning           = "#FFAC00"
warning_secondary = "#D58103"
error             = "#F05A4F"
error_secondary   = "#DC3127"

# ANSI 16 mappings
# Indices: 0-7 normal, 8-15 bright

[ansi.light.normal]
# 0-7
black   = "colors.light.text_primary"
red     = "accents.error_secondary"
green   = "accents.success_secondary"
yellow  = "#8B5801"
blue    = "accents.info_secondary"
magenta = "#7A47C2"
cyan    = "#106D78"
white   = "colors.light.text_tertiary"

[ansi.light.bright]
# 8-15
black   = "colors.light.text_secondary"
red     = "accents.error"
green   = "#43862A"
yellow  = "#A66A02"
blue    = "accents.info"
magenta = "#8C60CA"
cyan    = "#13838F"
white   = "colors.light.neutral"

[ansi.dark.normal]
# 0-7
black   = "colors.dark.primary"
red     = "#E65850"
green   = "#4C9830"
yellow  = "accents.warning_secondary"
blue    = "#008AED"
magenta = "#9B75D1"
cyan    = "#1595A3"
white   = "colors.dark.text_secondary"

[ansi.dark.bright]
# 8-15
black   = "#6B6B6B"
red     = "accents.error"
green   = "accents.success"
yellow  = "accents.warning"
blue    = "accents.info"
magenta = "#BA9FDF"
cyan    = "#1BBCCE"
white   = "colors.dark.text_primary"
